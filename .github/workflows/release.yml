name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Is this a pre-release?"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format. Use semantic versioning (e.g. 1.0.0 or 1.0.0-beta1)"
            exit 1
          fi

      - name: Check if tag already exists
        shell: bash
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Generate changelog
        shell: bash
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ -z "$LATEST_TAG" ]; then
            git log --oneline --pretty=format:"- %s" | head -50 > changelog.txt
          else
            git log "${LATEST_TAG}"..HEAD --oneline --pretty=format:"- %s" > changelog.txt
          fi

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: changelog.txt
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true

  build:
    needs: release
    uses: ./.github/workflows/build-and-publish.yml
    with:
      version: v${{ inputs.version }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
